<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Launcher</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #1e3a8a, #2563eb);
        color: white;
      }
      .container {
        text-align: center;
        padding: 32px;
        border-radius: 24px;
        background: rgba(0, 0, 0, 0.35);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }
      a.button {
        display: inline-block;
        margin-top: 20px;
        padding: 14px 28px;
        color: white;
        text-decoration: none;
        border-radius: 999px;
        background: #3b82f6;
        border: 2px solid #93c5fd;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      a.button:hover {
        transform: translateY(-2px);
        background: #60a5fa;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Launch the Game</h1>
      <p>Click the button below to open your game page.</p>
      <a class="button" href="game.html">Open Game</a>
    </div>
  </body>
</html>
